<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1440px;
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FFF8F0 0%, #FFF3E6 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 50px;
}
.header {
  width: 100%; text-align: center; margin-bottom: 40px;
}
.title {
  font-size: 68px; font-weight: 900; color: #D32F2F;
  line-height: 1.2; margin-bottom: 16px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
}
.subtitle {
  font-size: 32px; font-weight: 500; color: #666;
  background: #FFF3CD; padding: 8px 28px; border-radius: 20px;
  display: inline-block;
}
.table-container {
  width: 100%; background: #fff;
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.08);
  flex: 1;
}
.table-header {
  background: linear-gradient(135deg, #D32F2F 0%, #E53935 100%);
  color: #fff; padding: 20px 30px;
  font-size: 28px; font-weight: 700;
  text-align: center;
}
table {
  width: 100%; border-collapse: collapse;
}
th {
  background: #FFEBEE; color: #C62828;
  font-size: 26px; font-weight: 700;
  padding: 18px 16px; text-align: center;
  border-bottom: 3px solid #EF9A9A;
}
td {
  font-size: 26px; padding: 16px;
  text-align: center; border-bottom: 1px solid #F5F5F5;
  color: #333;
}
tr:nth-child(even) td { background: #FAFAFA; }
tr:hover td { background: #FFF3E0; }
.footer {
  width: 100%; margin-top: 30px;
  text-align: center;
}
.tags {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
  margin-bottom: 20px;
}
.tag {
  background: #FFF3CD; color: #E65100; font-size: 22px;
  padding: 6px 18px; border-radius: 16px; font-weight: 500;
}
.cta {
  background: linear-gradient(135deg, #FF6F00 0%, #F4511E 100%);
  color: #fff; font-size: 28px; font-weight: 700;
  padding: 16px 40px; border-radius: 30px;
  display: inline-block;
}
.watermark {
  position: absolute; bottom: 20px; right: 30px;
  font-size: 18px; color: #ccc;
}
</style>
</head>
<body>
  <div class="header">
    <div class="title">{{TITLE}}</div>
    <span class="subtitle">{{SUBTITLE}}</span>
  </div>
  <div class="table-container">
    <div class="table-header">{{TABLE_TITLE}}</div>
    <table>
      <thead><tr>{{TABLE_HEADERS}}</tr></thead>
      <tbody>{{TABLE_ROWS}}</tbody>
    </table>
  </div>
  <div class="footer">
    <div class="tags">{{TAGS}}</div>
    <div class="cta">💡 收藏+关注，获取更多升学资讯</div>
  </div>
  <div class="watermark">小红书教育干货</div>
</body>
</html>
