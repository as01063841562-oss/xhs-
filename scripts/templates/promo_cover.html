<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1440px;
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8CC 60%, #FFDDB0 100%);
  display: flex; flex-direction: column;
  position: relative; overflow: hidden;
}
/* 顶部装饰条 */
.top-bar {
  width: 100%; height: 8px;
  background: linear-gradient(90deg, #D32F2F 0%, #FF6F00 50%, #FFB74D 100%);
}
.corner-badge {
  position: absolute; top: 30px; right: 40px;
  font-size: 22px; color: #999; font-weight: 500;
}
.content {
  flex: 1; display: flex; flex-direction: column;
  padding: 50px 60px 40px;
}
/* 大标题区 */
.hero {
  text-align: center; margin-bottom: 40px;
}
.hero-title {
  font-size: 80px; font-weight: 900; color: #D32F2F;
  line-height: 1.15; margin-bottom: 20px;
  text-shadow: 3px 3px 0 rgba(211,47,47,0.08);
}
.hero-subtitle {
  font-size: 36px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #FF6F00 0%, #F4511E 100%);
  padding: 12px 36px; border-radius: 28px;
  display: inline-block;
  box-shadow: 0 4px 16px rgba(244,81,30,0.3);
}
/* 卖点列表 */
.selling-points {
  flex: 1; display: flex; flex-direction: column;
  gap: 20px; margin: 20px 0;
}
.point {
  display: flex; align-items: center; gap: 20px;
  background: #fff; border-radius: 20px;
  padding: 24px 32px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  border-left: 5px solid #FF6F00;
}
.point-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #FFE0B2 0%, #FFB74D 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
}
.point-text {
  font-size: 30px; font-weight: 600; color: #333;
  line-height: 1.4;
}
/* 底部CTA */
.cta-section {
  text-align: center; padding: 30px 0 20px;
}
.cta-btn {
  background: linear-gradient(135deg, #D32F2F 0%, #C62828 100%);
  color: #fff; font-size: 32px; font-weight: 700;
  padding: 20px 60px; border-radius: 40px;
  display: inline-block;
  box-shadow: 0 6px 24px rgba(211,47,47,0.35);
  margin-bottom: 16px;
}
.cta-hint {
  font-size: 22px; color: #999;
}
/* 装饰元素 */
.deco {
  position: absolute; opacity: 0.08; font-size: 120px;
}
.deco-1 { top: 120px; left: -20px; transform: rotate(-15deg); }
.deco-2 { bottom: 200px; right: -10px; transform: rotate(10deg); }
.tags-row {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
  margin-top: 16px;
}
.tag {
  background: #FFF3CD; color: #E65100; font-size: 20px;
  padding: 5px 16px; border-radius: 14px; font-weight: 500;
}
</style>
</head>
<body>
  <div class="top-bar"></div>
  <span class="deco deco-1">📚</span>
  <span class="deco deco-2">✨</span>
  <div class="corner-badge">*武汉本地升学干货</div>
  <div class="content">
    <div class="hero">
      <div class="hero-title">{{TITLE}}</div>
      <span class="hero-subtitle">{{SUBTITLE}}</span>
    </div>
    <div class="selling-points">
      {{POINTS}}
    </div>
    <div class="cta-section">
      <div class="cta-btn">👆 点击关注 · 获取完整资料</div>
      <div class="cta-hint">收藏+关注，每日更新武汉升学干货</div>
      <div class="tags-row">{{TAGS}}</div>
    </div>
  </div>
</body>
</html>
