<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1440px;
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8CC 100%);
  display: flex; flex-direction: column;
  padding: 60px 50px;
  position: relative;
}
.corner-badge {
  position: absolute; top: 30px; right: 40px;
  font-size: 22px; color: #999; font-weight: 500;
}
.header {
  text-align: center; margin-bottom: 50px;
}
.title {
  font-size: 72px; font-weight: 900; color: #D32F2F;
  line-height: 1.2;
  text-shadow: 3px 3px 0 rgba(211,47,47,0.1);
}
.subtitle {
  font-size: 32px; font-weight: 700; color: #E65100;
  background: #FFF3CD; padding: 10px 30px; border-radius: 24px;
  display: inline-block; margin-top: 16px;
}
.points-container {
  flex: 1; display: flex; flex-direction: column; gap: 24px;
}
.point-card {
  background: #fff; border-radius: 20px;
  padding: 28px 36px; display: flex; align-items: center; gap: 24px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border-left: 6px solid #FF6F00;
}
.point-number {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #FF6F00 0%, #F4511E 100%);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 26px; font-weight: 900; flex-shrink: 0;
}
.point-text {
  font-size: 30px; font-weight: 500; color: #333; line-height: 1.5;
}
.footer {
  margin-top: 40px; text-align: center;
}
.tags {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
  margin-bottom: 24px;
}
.tag {
  background: #FFF3CD; color: #E65100; font-size: 22px;
  padding: 6px 18px; border-radius: 16px; font-weight: 500;
}
.cta {
  background: linear-gradient(135deg, #D32F2F 0%, #C62828 100%);
  color: #fff; font-size: 28px; font-weight: 700;
  padding: 18px 50px; border-radius: 30px;
  display: inline-block;
}
</style>
</head>
<body>
  <div class="corner-badge">*武汉本地升学干货</div>
  <div class="header">
    <div class="title">{{TITLE}}</div>
    <span class="subtitle">{{SUBTITLE}}</span>
  </div>
  <div class="points-container">
    {{POINTS}}
  </div>
  <div class="footer">
    <div class="tags">{{TAGS}}</div>
    <div class="cta">👆 点击关注 · 每日更新升学干货</div>
  </div>
</body>
</html>
