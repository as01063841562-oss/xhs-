name: "暖色温馨头图"
description: "橙黄渐变底+深色标题+手绘风图标，适合生活/成长类"
created_from: "preset"

design:
  layout: "text_icon"
  background: "warm gradient from orange (#f5a623) to golden yellow (#f7dc6f)"
  text_position: "center"
  text_max_chars: 10
  text_style: "large bold dark brown (#4a3728) text, rounded friendly font"
  icon_style: "hand drawn cute icon, warm style, dark brown outline"
  icon_position: "beside or below title text"

safe_zone:
  description: "核心信息必须在中间 383x383 区域内"
  rule: "center all important elements within a 383x383 square area"

sizes:
  cover_large:
    width: 900
    height: 383
    ratio: "2.35:1"
  cover_small:
    width: 383
    height: 383
    ratio: "1:1"

prompt_template:
  style: "warm gradient background from orange (#f5a623) to golden yellow (#f7dc6f), cozy and inviting"
  text_element: "large bold dark brown title text centered, friendly rounded font"
  icon_element: "cute hand drawn icon, warm brown outline, related to life/growth topic"
  composition: "all key elements centered within middle square area for safe cropping"
  negative: "cold colors, blue, tech style, serious, dark, cluttered, text at bottom"

rules:
  - "底部不放文字"
  - "核心元素居中"
  - "温暖但不幼稚"
