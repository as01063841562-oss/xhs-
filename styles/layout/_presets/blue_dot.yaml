name: "蓝色圆点"
description: "居中数字标题+蓝色高亮+简洁留白，参考主流优质公众号排版"
created_from: "preset"

css:
  body:
    font_size: "16px"
    line_height: "1.9"
    color: "#333333"
    background: "#ffffff"
    padding: "0 8px"
    font_family: "-apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif"

  paragraph:
    margin_bottom: "25px"
    text_indent: "0"

  section_title:
    style: "centered_number"
    color: "#1e6fff"
    font_size: "20px"
    margin_top: "40px"
    margin_bottom: "20px"
    dot_color: "#1e6fff"

  sub_title:
    color: "#1e6fff"
    font_size: "17px"
    font_weight: "bold"
    margin_top: "28px"
    margin_bottom: "12px"

  highlight:
    color: "#1e6fff"
    bold: true

  blockquote:
    border_left_color: "#1e6fff"
    background: "#f7f8fa"
    padding: "15px 20px"
    border_radius: "4px"

  image:
    border_radius: "8px"
    margin: "20px auto"
    max_width: "100%"

  cta_card:
    background: "#f0f5ff"
    border_radius: "12px"
    padding: "20px"

  divider:
    style: "dotted"
    color: "#e0e0e0"
    margin: "30px 0"

  code_block:
    background: "#f6f8fa"
    color: "#24292e"
    font_size: "13px"
    padding: "16px 20px"
    border_radius: "8px"
    line_height: "1.6"
