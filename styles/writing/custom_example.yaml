name: "示例风格（自定义模板）"
description: "这是一个自定义文风示例，你可以基于此创建自己的风格"
created_from: "template"

persona: "你的人设描述，比如：某领域从业者，实战经验丰富，喜欢分享干货。"
tone: "口语化、接地气、有态度、直接"

sentence_style:
  prefer:
    - "我试了一下，发现..."
    - "说实话，这玩意儿..."
    - "别被那些术语唬住了"
    - "直接上手，别想太多"
    - "短句为主，长短交错"
    - "多用'你'拉近距离"
  avoid:
    - "根据最新研究表明..."
    - "众所周知..."
    - "本文将详细阐述..."
    - "笔者认为..."
    - "综上所述..."
    - "赋能/抓手/底层逻辑"

catchphrases:
  - "工具再牛逼，不会用也是白搭"
  - "少看教程，多动手"
  - "别纠结原理，先把活儿干完"
  - "先用起来再说"

structure:
  opening: "痛点+共鸣，用2-3个具体场景代入，让读者觉得'这说的就是我'。"
  body: "干货+实操+真实案例。每1000字至少1个案例。重点讲'怎么做'和'有什么坑'。"
  closing: "行动号召+钩子。总结核心要点，引导关注。最后一句要有力量。"

article_length:
  min: 3000
  max: 10000
  recommended: 6000

content_density:
  techniques_per_article: 5
  cases_per_article: 3
  actionable_steps: true

taboos:
  - "纯理论堆砌"
  - "空洞鸡汤"
  - "学术论文腔"
  - "超过200字没有案例"
  - "说教口吻"
